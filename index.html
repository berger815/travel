<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#231f1c">
<title>ANTIGUA FIELD GUIDE</title>
<style>
  :root{
    --ink:#231f1c;
    --stone:#3a342c;
    --stone-2:#4d453a;
    --parchment:#ece3cf;
    --parchment-dim:#cfc3a3;
    --ochre:#c9912f;
    --terracotta:#b5532a;
    --patina:#5e7268;
    --patina-bright:#7fa392;
    --line:#5a5246;
    --danger:#a8412c;
    --good:#7fa392;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{
    margin:0; padding:0; height:100%; overflow:hidden;
    background:var(--ink);
    color:var(--parchment);
    font-family:-apple-system, system-ui, "Segoe UI", Roboto, sans-serif;
    -webkit-user-select:none; user-select:none;
    touch-action:none;
  }
  #app{position:fixed; inset:0; display:flex; flex-direction:column;}

  /* ---------- HUD ---------- */
  #hud{
    flex:0 0 auto;
    background:linear-gradient(180deg, var(--stone) 0%, var(--ink) 100%);
    border-bottom:2px solid var(--line);
    padding:8px 10px 8px;
    padding-top:max(8px, env(safe-area-inset-top));
    display:flex; align-items:center; gap:10px;
    font-family:"SF Mono", "Menlo", "Courier New", monospace;
  }
  #compassWidget{
    width:52px; height:52px; flex:0 0 auto; position:relative;
    border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #4d453a, #231f1c 75%);
    border:2px solid var(--ochre);
  }
  #compassWidget svg{position:absolute; inset:0; width:100%; height:100%;}
  #hudText{flex:1; min-width:0;}
  .hudRow{display:flex; justify-content:space-between; font-size:11px; line-height:1.5; color:var(--parchment-dim);}
  .hudRow b{color:var(--parchment); font-weight:600;}
  #gpsState{
    flex:0 0 auto; width:10px; height:10px; border-radius:50%;
    background:var(--danger); box-shadow:0 0 6px var(--danger);
  }
  #gpsState.ok{background:var(--good); box-shadow:0 0 6px var(--good);}
  #gpsState.warn{background:var(--ochre); box-shadow:0 0 6px var(--ochre);}

  /* ---------- MAP ---------- */
  #mapWrap{flex:1 1 auto; position:relative; overflow:hidden; background:#e4d9bc;}
  #mapCanvas{position:absolute; top:0; left:0; touch-action:none;}

  #scaleBar{
    position:absolute; left:10px; bottom:10px;
    font-family:"SF Mono","Menlo",monospace; font-size:10px;
    color:var(--ink); background:rgba(236,227,207,0.85);
    padding:3px 8px; border-radius:3px; border:1px solid var(--stone-2);
  }
  #recenterBtn{
    position:absolute; right:10px; bottom:10px;
    width:42px; height:42px; border-radius:50%;
    background:var(--stone); border:2px solid var(--ochre);
    color:var(--parchment); font-size:18px;
    display:flex; align-items:center; justify-content:center;
  }
  #compassPermBtn{
    position:absolute; right:10px; top:10px;
    background:var(--terracotta); color:var(--parchment);
    border:1px solid var(--ochre); border-radius:6px;
    padding:8px 10px; font-size:11px; font-weight:600;
    display:none;
  }

  /* ---------- FILTER CHIPS ---------- */
  #chips{
    flex:0 0 auto; display:flex; gap:6px; padding:8px 10px;
    background:var(--ink); border-top:1px solid var(--line);
    overflow-x:auto;
  }
  .chip{
    flex:0 0 auto; padding:6px 12px; border-radius:14px;
    border:1px solid var(--line); font-size:12px; font-weight:600;
    color:var(--parchment-dim); background:var(--stone);
    letter-spacing:0.03em; text-transform:uppercase;
  }
  .chip.active{background:var(--ochre); color:var(--ink); border-color:var(--ochre);}

  /* ---------- LIST / SHEET ---------- */
  #sheet{
    flex:0 0 auto;
    background:var(--ink);
    max-height:38vh; overflow-y:auto;
    border-top:1px solid var(--line);
    padding-bottom:env(safe-area-inset-bottom);
  }
  .poiRow{
    display:flex; align-items:center; gap:10px;
    padding:10px 12px; border-bottom:1px solid var(--stone);
  }
  .poiDot{width:10px; height:10px; border-radius:50%; flex:0 0 auto;}
  .poiInfo{flex:1; min-width:0;}
  .poiName{font-size:14px; font-weight:600; color:var(--parchment);}
  .poiMeta{font-size:11px; color:var(--parchment-dim); font-family:"SF Mono","Menlo",monospace; margin-top:2px;}
  .poiDist{font-size:13px; font-weight:700; color:var(--ochre); font-family:"SF Mono","Menlo",monospace; text-align:right; flex:0 0 auto; min-width:54px;}

  /* ---------- DETAIL CARD ---------- */
  #detail{
    position:absolute; left:0; right:0; bottom:0;
    background:var(--stone);
    border-top:2px solid var(--ochre);
    border-radius:14px 14px 0 0;
    padding:14px 16px calc(16px + env(safe-area-inset-bottom));
    transform:translateY(100%);
    transition:transform 0.25s ease;
    max-height:60%;
    overflow-y:auto;
  }
  #detail.open{transform:translateY(0);}
  #detailClose{
    position:absolute; right:12px; top:10px;
    width:28px; height:28px; border-radius:50%;
    background:var(--ink); color:var(--parchment-dim);
    display:flex; align-items:center; justify-content:center; font-size:14px;
  }
  #detailCat{
    display:inline-block; font-size:10px; letter-spacing:0.08em; text-transform:uppercase;
    font-weight:700; padding:3px 8px; border-radius:4px; margin-bottom:8px;
  }
  #detailName{font-size:19px; font-weight:700; color:var(--parchment); font-family:Georgia, "Times New Roman", serif; margin-bottom:4px;}
  #detailAddr{font-size:12px; color:var(--parchment-dim); margin-bottom:10px;}
  #detailBlurb{font-size:14px; line-height:1.5; color:var(--parchment); margin-bottom:12px;}
  .detailStatRow{display:flex; gap:16px; font-family:"SF Mono","Menlo",monospace; font-size:12px; color:var(--parchment-dim); border-top:1px solid var(--line); padding-top:10px;}
  .detailStatRow b{color:var(--ochre); display:block; font-size:15px; font-weight:700;}

  #scrim{position:absolute; inset:0; background:rgba(0,0,0,0.0); pointer-events:none;}

  ::-webkit-scrollbar{display:none;}
</style>
</head>
<body>
<div id="app">

  <div id="hud">
    <div id="compassWidget"><svg viewBox="0 0 100 100" id="compassSvg"></svg></div>
    <div id="hudText">
      <div class="hudRow"><span>HDG</span><b id="hdgVal">--&deg;</b></div>
      <div class="hudRow"><span>POS</span><b id="posVal">no fix</b></div>
      <div class="hudRow"><span>ACC</span><b id="accVal">--</b></div>
    </div>
    <div id="gpsState"></div>
  </div>

  <div id="mapWrap">
    <canvas id="mapCanvas"></canvas>
    <div id="scrim"></div>
    <button id="compassPermBtn">ENABLE COMPASS</button>
    <div id="scaleBar">-- m</div>
    <button id="recenterBtn">&#9678;</button>

    <div id="detail">
      <button id="detailClose">&#10005;</button>
      <span id="detailCat">CAT</span>
      <div id="detailName">--</div>
      <div id="detailAddr">--</div>
      <div id="detailBlurb">--</div>
      <div class="detailStatRow">
        <div>DIST<b id="detailDist">--</b></div>
        <div>BEARING<b id="detailBearing">--</b></div>
        <div>HOURS<b id="detailHours">--</b></div>
      </div>
    </div>
  </div>

  <div id="chips">
    <div class="chip active" data-cat="all">All</div>
    <div class="chip" data-cat="history">History</div>
    <div class="chip" data-cat="food">Eat</div>
    <div class="chip" data-cat="cafe">Coffee</div>
    <div class="chip" data-cat="shop">Shop</div>
  </div>

  <div id="sheet"></div>

</div>

<script>
(function(){
"use strict";

/* ============================================================
   POI DATA -- embedded, no network required
   cat: history | food | cafe | shop
   ============================================================ */
var POIS = [
  {id:1,  cat:"history", name:"Arco de Santa Catalina", lat:14.5596256, lon:-90.7342772,
   addr:"5a Avenida Norte", hours:"Open 24h",
   blurb:"The yellow arch was built in the 1690s so cloistered nuns next door could cross the street unseen by passersby. The clock was added in the 1830s. It is the single most photographed structure in Antigua, especially at sunrise with Volcan de Agua framed behind it."},
  {id:2,  cat:"history", name:"Parque Central", lat:14.5568894, lon:-90.7336838,
   addr:"Heart of the historic center", hours:"Open 24h",
   blurb:"The central plaza has anchored the city since the capital moved here in 1543. The mermaid fountain dates to 1738. Surrounding it: the cathedral, the old city hall, and the former captains-general palace -- the four classic anchors of any Spanish colonial main square."},
  {id:3,  cat:"history", name:"Cerro de la Cruz", lat:14.5643144, lon:-90.7317686,
   addr:"Hilltop north of downtown", hours:"7am-6pm",
   blurb:"A short uphill walk to a stone cross overlooking the entire city and three volcanoes -- Agua, Fuego, and Acatenango. Best light is early morning before haze builds up. Go in a group; solo robberies have happened on the path."},
  {id:4,  cat:"history", name:"Convento Santa Clara", lat:14.5547673, lon:-90.7310089,
   addr:"2a Avenida Norte", hours:"9am-5pm, entry fee",
   blurb:"A Franciscan nunnery founded in 1699, ruined by the 1773 earthquake that ended Antigua's run as capital. The roofless choir room and overgrown courtyards are some of the most atmospheric ruins in town."},
  {id:5,  cat:"history", name:"Convento de las Capuchinas", lat:14.5597552, lon:-90.7313825,
   addr:"2a Avenida Norte", hours:"9am-5pm, entry fee",
   blurb:"Built in the 1730s for an order of nuns who took vows of near-total silence. The unique circular tower of windowless cells (the 'torreon') is unlike anything else in colonial Guatemala -- built for solitary penance."},
  {id:6,  cat:"history", name:"Catedral de Santiago (ruins)", lat:14.5565474, lon:-90.7330108,
   addr:"5a Calle Oriente, on Parque Central", hours:"Varies, entry fee for ruins",
   blurb:"Originally completed in 1680 as one of the grandest cathedrals in the Americas. Toppled by the 1773 earthquake; only the front chapel was rebuilt for active worship. Walk through the collapsed nave behind it -- exposed arches open straight to the sky."},
  {id:7,  cat:"history", name:"Iglesia de la Merced", lat:14.5612835, lon:-90.7341287,
   addr:"1a Calle Poniente", hours:"Varies, rooftop entry fee",
   blurb:"Finished in 1767, its ornate yellow Baroque facade survived the 1773 quake better than almost any other church in the city. Pay the small rooftop fee for a 360-degree view straight across the Arco de Santa Catalina to the volcanoes."},
  {id:8,  cat:"history", name:"Palacio de los Capitanes Generales", lat:14.556114, lon:-90.7334642,
   addr:"5a Calle Poniente, on Parque Central", hours:"Exterior viewing",
   blurb:"The former seat of Spanish colonial government for all of Central America, originally built in the 1550s. Its long double-arched facade defines the south side of the plaza."},
  {id:9,  cat:"history", name:"San Francisco el Grande", lat:14.5539257, lon:-90.7293626,
   addr:"7a Calle Oriente, east side", hours:"6am-6pm, ruins/museum fee",
   blurb:"Holds the tomb of Hermano Pedro, Central America's first canonized saint, who founded the continent's first free hospital here in the 1660s. Pilgrims still leave handwritten petitions at his crypt."},
  {id:10, cat:"history", name:"Convento Santo Domingo", lat:14.5594409, lon:-90.7272816,
   addr:"3a Calle Oriente, enter via Hotel Santo Domingo", hours:"Museum hours, fee",
   blurb:"Once the largest religious complex in Central America. Now half boutique hotel, half museum -- you can walk colonial crypts and pre-Columbian artifact galleries in the same visit."},
  {id:11, cat:"history", name:"Ruinas de la Candelaria", lat:14.5632876, lon:-90.7291046,
   addr:"Northeast of center", hours:"7am-6pm",
   blurb:"Modest, fenced ruins of a colonial church, quieter and less touristed than the big-name sites -- worth a five minute detour on the walk to Cerro de la Cruz."},

  {id:20, cat:"food", name:"Madre Tierra", lat:14.5578213, lon:-90.7352176,
   addr:"6a Avenida Norte", hours:"7am-11pm",
   blurb:"Wood-grilled meats, tacos de lomito, and homemade chicken soup. Generous portions meant for sharing -- order the mixed grill platter for a table of four or more."},
  {id:21, cat:"food", name:"Carlos & Carlos", lat:14.5556952, lon:-90.7331454,
   addr:"4a Avenida Sur", hours:"Tue-Sun 3pm-10pm",
   blurb:"Upscale Italian-leaning menu -- black pasta, salmon ravioli, fresh calamari. A step up from the casual street-food scene, good for a proper sit-down dinner."},
  {id:22, cat:"food", name:"Rooftop Antigua", lat:14.5567264, lon:-90.7351942,
   addr:"6a Avenida Norte", hours:"8am-7pm",
   blurb:"Breakfast spot with a clear view of all three surrounding volcanoes from the roof. Try the chicken and waffle sandwich or classic Guatemalan breakfast plate."},
  {id:23, cat:"food", name:"Lava Terrace", lat:14.5577655, lon:-90.7331546,
   addr:"4 Avenida Norte", hours:"12pm-1am",
   blurb:"Rooftop bar and grill a couple blocks from the plaza -- burgers, cocktails, DJ sets in the evening. Loud and lively rather than quiet and historic."},
  {id:24, cat:"food", name:"Doña Luisa Xicotencatl", lat:14.5574076, lon:-90.7318793,
   addr:"4a Calle Oriente", hours:"6:30am-9pm",
   blurb:"A colonial-house restaurant and bakery built around a leafy courtyard. Known for traditional Guatemalan breakfast and the bakery's orange-chocolate bread."},
  {id:25, cat:"food", name:"Cafeteria & Bakery Santa Clara", lat:14.5539632, lon:-90.7312718,
   addr:"Near Convento Santa Clara", hours:"6:30am-9pm",
   blurb:"Rooftop terrace with volcano views and live music some evenings. Famous locally for cinnamon buns and a steak sandwich that punches above its price."},
  {id:26, cat:"food", name:"Hector's Deli", lat:14.5553188, lon:-90.7360803,
   addr:"6a Calle Poniente", hours:"7am-5pm",
   blurb:"Sandwiches, bagels and pastries in a colonial courtyard with a fountain. A good reset if you want something familiar between days of local food."},

  {id:30, cat:"cafe", name:"Fat Cat Coffee House", lat:14.5574487, lon:-90.7314933,
   addr:"4a Calle Oriente", hours:"7am-7pm",
   blurb:"Frequently ranked among Central America's best coffee shops. Every brew method on offer -- siphon, pour-over, aeropress. Small, gets crowded; six tables only."},
  {id:31, cat:"cafe", name:"Cafe Cafe Guatemala", lat:14.5594578, lon:-90.736237,
   addr:"7a Avenida Norte", hours:"6am-9pm",
   blurb:"Bright, plant-filled brunch spot with strong vegetarian and vegan options and milk alternatives -- a reliable easy-morning choice."},
  {id:32, cat:"cafe", name:"12 Onzas", lat:14.5572484, lon:-90.7316617,
   addr:"4a Calle Oriente", hours:"7am-7pm",
   blurb:"Pastel-toned courtyard cafe known for chilaquiles, a parfait bowl, and chili-honey avocado toast."},
  {id:33, cat:"cafe", name:"Cafe Lito", lat:14.5557387, lon:-90.7297094,
   addr:"1a Avenida Sur", hours:"8am-7/8pm",
   blurb:"Small-batch roaster with a genuinely local, unhurried vibe -- good for a slow morning away from the tourist core, east of the plaza."},
  {id:34, cat:"cafe", name:"Cafe La Parada", lat:14.5610061, lon:-90.7353449,
   addr:"Across from Iglesia de la Merced", hours:"7am-8:30pm",
   blurb:"Fast, cheap, and good -- a popular shuttle-bus stop for a reason. Strong cortado, friendly service, right across from one of the prettiest churches in town."},
  {id:35, cat:"cafe", name:"El Viejo Cafe", lat:14.5583571, lon:-90.7353541,
   addr:"3a Calle Poniente", hours:"6:30am-9/10pm",
   blurb:"Bakery out front, sit-down cafe behind. Regularly cited as one of the best breakfasts in Antigua; arrives bustling with locals, not just tourists."},
  {id:36, cat:"cafe", name:"Cafe Boheme", lat:14.5563256, lon:-90.7355358,
   addr:"5a Calle Poniente", hours:"7:30am-8pm",
   blurb:"Tourist-friendly menu with a co-working crowd of laptops by day. A few tables have direct volcano views -- worth asking for one."},

  {id:40, cat:"shop", name:"Mercado Central", lat:14.5583509, lon:-90.739074,
   addr:"Poniente 4, west edge of center", hours:"7am-6pm daily",
   blurb:"The real working market -- flowers, produce, meat, fish, and a secondhand clothing section in back, plus a local bus depot. Less curated than the tourist craft markets, more authentic."},
  {id:41, cat:"shop", name:"Artisan Textile Market", lat:14.5570906, lon:-90.73929,
   addr:"Poniente 5", hours:"9am-6pm",
   blurb:"Dense maze of textile and leather stalls about four blocks from the plaza. Negotiation is expected and welcomed -- start around 60% of the asking price."},
  {id:42, cat:"shop", name:"Mercado Municipal de Alimentos", lat:14.5584325, lon:-90.7393499,
   addr:"Poniente 4", hours:"8:30am-6pm",
   blurb:"Food-focused sister market next to the main Mercado Central -- good for fresh fruit, snacks, and people-watching rather than souvenirs."},
  {id:43, cat:"shop", name:"ChocoMuseo", lat:14.5573762, lon:-90.7339933,
   addr:"4a Calle Poniente, facing Parque Central", hours:"10am-7pm",
   blurb:"Hands-on cacao-to-chocolate workshop covering the crop's deep roots in Mesoamerican culture. Walk-in classes run regularly through the day; book ahead in high season."},
  {id:44, cat:"shop", name:"Casa del Jade", lat:14.5574332, lon:-90.7325034,
   addr:"4a Calle Oriente", hours:"9:30am-6:30pm",
   blurb:"Small museum and workshop on jade's importance in Maya culture, with a carving class where you shape and keep your own piece."},
  {id:45, cat:"shop", name:"Nim Po't", lat:14.560063, lon:-90.7341729,
   addr:"5a Avenida Norte, near the arch", hours:"9am-9pm",
   blurb:"The single best one-stop shop for authentic Guatemalan textiles if your schedule is tight -- fixed prices, museum-style displays of regional traditional dress."},
  {id:46, cat:"shop", name:"Casa de Artes", lat:14.5533919, lon:-90.7331308,
   addr:"4 Avenida Sur", hours:"10am-1pm, 2:30pm-6pm",
   blurb:"Curated folk-art gallery and private collection, more museum than market. Pricier, but the mask wall and textile pieces are genuinely exceptional."},
  {id:47, cat:"shop", name:"Casa de los Gigantes", lat:14.5544817, lon:-90.7300056,
   addr:"7a Calle Oriente, east side", hours:"9am-6pm",
   blurb:"Home goods and handicrafts around a hidden rose-filled courtyard -- wood cutting boards, masks, textiles. Worth the walk east of the main shopping streets."},
  {id:48, cat:"shop", name:"Manos Preciosas", lat:14.5540582, lon:-90.734139,
   addr:"5a Avenida Sur", hours:"8am-7pm",
   blurb:"Fair-trade shop selling directly-sourced artisan textiles and goods at fixed, no-haggle prices -- proceeds support the makers directly."}
];

var CAT_COLOR = {history:"#b5532a", food:"#c9912f", cafe:"#7fa392", shop:"#5e7268"};
var CAT_LABEL = {history:"History", food:"Eat", cafe:"Coffee", shop:"Shop"};

/* ============================================================
   GEO PROJECTION -- local flat-earth meters around Parque Central
   ============================================================ */
var ORIGIN_LAT = 14.5568894;
var ORIGIN_LON = -90.7336838;
var M_PER_DEG_LAT = 110540;
var M_PER_DEG_LON = 111320 * Math.cos(ORIGIN_LAT * Math.PI / 180);

function toLocalXY(lat, lon){
  var x = (lon - ORIGIN_LON) * M_PER_DEG_LON;
  var y = (ORIGIN_LAT - lat) * M_PER_DEG_LAT; // north = up = negative y in screen later
  return {x:x, y:y};
}

function haversineMeters(lat1, lon1, lat2, lon2){
  var R = 6371000;
  var dLat = (lat2-lat1) * Math.PI/180;
  var dLon = (lon2-lon1) * Math.PI/180;
  var a = Math.sin(dLat/2)*Math.sin(dLat/2) +
          Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*
          Math.sin(dLon/2)*Math.sin(dLon/2);
  var c = 2*Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  return R*c;
}

function bearingDeg(lat1, lon1, lat2, lon2){
  var phi1 = lat1*Math.PI/180, phi2 = lat2*Math.PI/180;
  var dLon = (lon2-lon1)*Math.PI/180;
  var y = Math.sin(dLon)*Math.cos(phi2);
  var x = Math.cos(phi1)*Math.sin(phi2) - Math.sin(phi1)*Math.cos(phi2)*Math.cos(dLon);
  var brng = Math.atan2(y,x)*180/Math.PI;
  return (brng + 360) % 360;
}

/* precompute local xy for each poi */
POIS.forEach(function(p){
  var xy = toLocalXY(p.lat, p.lon);
  p.x = xy.x; p.y = xy.y;
});

/* ============================================================
   STATE
   ============================================================ */
var state = {
  userLat:null, userLon:null, userAcc:null,
  heading:null, headingSource:null,
  camX:0, camY:0, // camera center in local meters
  scale:6.0,      // pixels per meter
  activeCat:"all",
  selectedPoi:null,
  gpsOk:false,
  dragging:false,
  lastTouch:null,
  pinchStartDist:null,
  pinchStartScale:null
};

/* ============================================================
   CANVAS / RENDERING
   ============================================================ */
var canvas = document.getElementById("mapCanvas");
var ctx = canvas.getContext("2d");
var mapWrap = document.getElementById("mapWrap");

function resizeCanvas(){
  var w = mapWrap.clientWidth, h = mapWrap.clientHeight;
  canvas.width = w * (window.devicePixelRatio||1);
  canvas.height = h * (window.devicePixelRatio||1);
  canvas.style.width = w+"px";
  canvas.style.height = h+"px";
  draw();
}
window.addEventListener("resize", resizeCanvas);

function worldToScreen(x, y){
  var dpr = window.devicePixelRatio||1;
  var cw = canvas.width/dpr, ch = canvas.height/dpr;
  var sx = (x - state.camX) * state.scale + cw/2;
  var sy = (y - state.camY) * state.scale + ch/2;
  return {x:sx, y:sy};
}

function screenToWorld(sx, sy){
  var dpr = window.devicePixelRatio||1;
  var cw = canvas.width/dpr, ch = canvas.height/dpr;
  var x = (sx - cw/2)/state.scale + state.camX;
  var y = (sy - ch/2)/state.scale + state.camY;
  return {x:x, y:y};
}

function visiblePois(){
  if (state.activeCat === "all") return POIS;
  return POIS.filter(function(p){ return p.cat === state.activeCat; });
}

function draw(){
  var dpr = window.devicePixelRatio||1;
  ctx.save();
  ctx.scale(dpr, dpr);
  var cw = canvas.width/dpr, ch = canvas.height/dpr;

  ctx.fillStyle = "#e4d9bc";
  ctx.fillRect(0,0,cw,ch);

  drawGrid(cw,ch);
  drawPois();
  drawUser();

  ctx.restore();
  updateScaleBar();
}

function drawGrid(cw,ch){
  /* schematic colonial block grid, ~85m spacing, faint reference only */
  var block = 85;
  ctx.strokeStyle = "rgba(90,82,70,0.35)";
  ctx.lineWidth = 1;

  var topLeft = screenToWorld(0,0);
  var botRight = screenToWorld(cw,ch);

  var xStart = Math.floor(topLeft.x/block)*block;
  var xEnd = Math.ceil(botRight.x/block)*block;
  var yStart = Math.floor(topLeft.y/block)*block;
  var yEnd = Math.ceil(botRight.y/block)*block;

  for (var x=xStart; x<=xEnd; x+=block){
    var p1 = worldToScreen(x, yStart);
    var p2 = worldToScreen(x, yEnd);
    ctx.beginPath(); ctx.moveTo(p1.x,p1.y); ctx.lineTo(p2.x,p2.y); ctx.stroke();
  }
  for (var y=yStart; y<=yEnd; y+=block){
    var q1 = worldToScreen(xStart, y);
    var q2 = worldToScreen(xEnd, y);
    ctx.beginPath(); ctx.moveTo(q1.x,q1.y); ctx.lineTo(q2.x,q2.y); ctx.stroke();
  }

  /* plaza highlight block at origin */
  var pl1 = worldToScreen(-42,-42);
  var pl2 = worldToScreen(42,42);
  ctx.fillStyle = "rgba(127,163,146,0.25)";
  ctx.fillRect(pl1.x, pl1.y, pl2.x-pl1.x, pl2.y-pl1.y);
}

function drawPois(){
  var list = visiblePois();
  for (var i=0;i<list.length;i++){
    var p = list[i];
    var s = worldToScreen(p.x, p.y);
    var dpr = window.devicePixelRatio||1;
    if (s.x < -30 || s.y < -30 || s.x > canvas.width/dpr+30 || s.y > canvas.height/dpr+30) continue;

    var r = (state.selectedPoi===p) ? 9 : 6;
    ctx.beginPath();
    ctx.arc(s.x, s.y, r, 0, Math.PI*2);
    ctx.fillStyle = CAT_COLOR[p.cat] || "#888";
    ctx.fill();
    ctx.lineWidth = 2;
    ctx.strokeStyle = (state.selectedPoi===p) ? "#ece3cf" : "rgba(35,31,28,0.6)";
    ctx.stroke();

    if (state.scale > 4 || state.selectedPoi===p){
      ctx.font = "600 11px -apple-system, system-ui, sans-serif";
      ctx.fillStyle = "#231f1c";
      var label = p.name.length > 22 ? p.name.slice(0,21)+"\u2026" : p.name;
      var tw = ctx.measureText(label).width;
      ctx.fillStyle = "rgba(236,227,207,0.88)";
      ctx.fillRect(s.x+10, s.y-9, tw+8, 16);
      ctx.fillStyle = "#231f1c";
      ctx.fillText(label, s.x+14, s.y+3);
    }
  }
}

function drawUser(){
  if (state.userLat===null) return;
  var xy = toLocalXY(state.userLat, state.userLon);
  var s = worldToScreen(xy.x, xy.y);

  if (state.userAcc){
    var rad = state.userAcc * state.scale;
    ctx.beginPath();
    ctx.arc(s.x, s.y, rad, 0, Math.PI*2);
    ctx.fillStyle = "rgba(201,145,47,0.15)";
    ctx.fill();
    ctx.strokeStyle = "rgba(201,145,47,0.4)";
    ctx.stroke();
  }

  ctx.save();
  ctx.translate(s.x, s.y);
  if (state.heading!==null){
    ctx.rotate(state.heading * Math.PI/180);
  }
  ctx.beginPath();
  ctx.moveTo(0,-16);
  ctx.lineTo(8,10);
  ctx.lineTo(0,4);
  ctx.lineTo(-8,10);
  ctx.closePath();
  ctx.fillStyle = "#b5532a";
  ctx.strokeStyle = "#ece3cf";
  ctx.lineWidth = 1.5;
  ctx.fill();
  ctx.stroke();
  ctx.restore();

  ctx.beginPath();
  ctx.arc(s.x, s.y, 4, 0, Math.PI*2);
  ctx.fillStyle = "#ece3cf";
  ctx.fill();
}

function updateScaleBar(){
  var bar = document.getElementById("scaleBar");
  var metersFor100px = 100 / state.scale;
  bar.textContent = Math.round(metersFor100px) + " m";
}

/* ============================================================
   PAN / ZOOM (touch + mouse)
   ============================================================ */
function dist(t1,t2){
  var dx=t1.clientX-t2.clientX, dy=t1.clientY-t2.clientY;
  return Math.sqrt(dx*dx+dy*dy);
}

canvas.addEventListener("touchstart", function(e){
  hideDetail();
  if (e.touches.length===1){
    state.dragging = true;
    state.lastTouch = {x:e.touches[0].clientX, y:e.touches[0].clientY};
  } else if (e.touches.length===2){
    state.dragging = false;
    state.pinchStartDist = dist(e.touches[0], e.touches[1]);
    state.pinchStartScale = state.scale;
  }
}, {passive:true});

canvas.addEventListener("touchmove", function(e){
  if (e.touches.length===1 && state.dragging){
    var t = e.touches[0];
    var dx = t.clientX - state.lastTouch.x;
    var dy = t.clientY - state.lastTouch.y;
    state.camX -= dx/state.scale;
    state.camY -= dy/state.scale;
    state.lastTouch = {x:t.clientX, y:t.clientY};
    draw();
  } else if (e.touches.length===2 && state.pinchStartDist){
    var d = dist(e.touches[0], e.touches[1]);
    var ratio = d/state.pinchStartDist;
    state.scale = Math.max(1.2, Math.min(20, state.pinchStartScale*ratio));
    draw();
  }
}, {passive:true});

canvas.addEventListener("touchend", function(e){
  if (e.touches.length===0){
    state.dragging = false;
    state.pinchStartDist = null;
  }
});

canvas.addEventListener("click", function(e){
  var rect = canvas.getBoundingClientRect();
  var sx = e.clientX - rect.left, sy = e.clientY - rect.top;
  var w = screenToWorld(sx,sy);
  var best = null, bestD = 18/state.scale; // tap tolerance in meters
  visiblePois().forEach(function(p){
    var dd = Math.sqrt((p.x-w.x)*(p.x-w.x)+(p.y-w.y)*(p.y-w.y));
    if (dd < bestD){ bestD = dd; best = p; }
  });
  if (best){ selectPoi(best); }
});

document.getElementById("recenterBtn").addEventListener("click", function(){
  if (state.userLat!==null){
    var xy = toLocalXY(state.userLat, state.userLon);
    state.camX = xy.x; state.camY = xy.y;
    draw();
  }
});

/* ============================================================
   GPS
   ============================================================ */
var gpsStateEl = document.getElementById("gpsState");
var posValEl = document.getElementById("posVal");
var accValEl = document.getElementById("accVal");

function onPosition(pos){
  state.userLat = pos.coords.latitude;
  state.userLon = pos.coords.longitude;
  state.userAcc = pos.coords.accuracy;
  state.gpsOk = true;
  gpsStateEl.className = (state.userAcc < 20) ? "ok" : "warn";
  posValEl.textContent = state.userLat.toFixed(5)+", "+state.userLon.toFixed(5);
  accValEl.textContent = "\u00b1"+Math.round(state.userAcc)+"m";

  if (!state._centeredOnce){
    var xy = toLocalXY(state.userLat, state.userLon);
    state.camX = xy.x; state.camY = xy.y;
    state._centeredOnce = true;
  }
  refreshList();
  draw();
}

function onPositionError(err){
  state.gpsOk = false;
  gpsStateEl.className = "";
  posValEl.textContent = "no fix";
  accValEl.textContent = "--";
}

if ("geolocation" in navigator){
  navigator.geolocation.watchPosition(onPosition, onPositionError, {
    enableHighAccuracy:true, maximumAge:2000, timeout:15000
  });
}

/* ============================================================
   COMPASS / HEADING
   ============================================================ */
var hdgValEl = document.getElementById("hdgVal");
var compassSvg = document.getElementById("compassSvg");
var compassPermBtn = document.getElementById("compassPermBtn");

function renderCompassWidget(heading){
  var h = heading===null ? 0 : heading;
  var parts = [];
  parts.push('<line x1="50" y1="50" x2="50" y2="14" stroke="#b5532a" stroke-width="5" stroke-linecap="round" transform="rotate('+h+' 50 50)"/>');
  parts.push('<line x1="50" y1="50" x2="50" y2="80" stroke="#7fa392" stroke-width="3" stroke-linecap="round" transform="rotate('+h+' 50 50)"/>');
  parts.push('<circle cx="50" cy="50" r="4" fill="#ece3cf"/>');
  parts.push('<text x="50" y="10" text-anchor="middle" fill="#ece3cf" font-size="9" font-weight="700">N</text>');
  compassSvg.innerHTML = parts.join("");
}
renderCompassWidget(null);

function onOrientation(e){
  var heading = null;
  if (typeof e.webkitCompassHeading === "number"){
    heading = e.webkitCompassHeading; // iOS, already true/magnetic compass heading
  } else if (e.absolute && typeof e.alpha === "number"){
    heading = 360 - e.alpha;
  } else if (typeof e.alpha === "number"){
    heading = 360 - e.alpha;
  }
  if (heading!==null){
    heading = (heading+360)%360;
    state.heading = heading;
    hdgValEl.textContent = Math.round(heading)+"\u00b0";
    renderCompassWidget(heading);
    draw();
  }
}

function setupCompass(){
  var DOE = window.DeviceOrientationEvent;
  if (!DOE){ return; }
  if (typeof DOE.requestPermission === "function"){
    compassPermBtn.style.display = "block";
    compassPermBtn.addEventListener("click", function(){
      DOE.requestPermission().then(function(resp){
        if (resp === "granted"){
          window.addEventListener("deviceorientation", onOrientation, true);
          compassPermBtn.style.display = "none";
        }
      }).catch(function(){});
    });
  } else {
    window.addEventListener("deviceorientationabsolute", onOrientation, true);
    window.addEventListener("deviceorientation", onOrientation, true);
  }
}
setupCompass();

/* ============================================================
   LIST / SHEET / FILTER CHIPS
   ============================================================ */
var sheetEl = document.getElementById("sheet");
var chips = document.querySelectorAll(".chip");

chips.forEach(function(chip){
  chip.addEventListener("click", function(){
    chips.forEach(function(c){ c.classList.remove("active"); });
    chip.classList.add("active");
    state.activeCat = chip.getAttribute("data-cat");
    refreshList();
    draw();
  });
});

function refreshList(){
  var list = visiblePois().slice();
  if (state.userLat!==null){
    list.forEach(function(p){
      p._dist = haversineMeters(state.userLat, state.userLon, p.lat, p.lon);
    });
    list.sort(function(a,b){ return a._dist - b._dist; });
  } else {
    list.sort(function(a,b){ return a.name.localeCompare(b.name); });
  }

  sheetEl.innerHTML = "";
  list.forEach(function(p){
    var row = document.createElement("div");
    row.className = "poiRow";

    var dot = document.createElement("div");
    dot.className = "poiDot";
    dot.style.background = CAT_COLOR[p.cat];
    row.appendChild(dot);

    var info = document.createElement("div");
    info.className = "poiInfo";
    var nameEl = document.createElement("div");
    nameEl.className = "poiName";
    nameEl.textContent = p.name;
    var metaEl = document.createElement("div");
    metaEl.className = "poiMeta";
    metaEl.textContent = CAT_LABEL[p.cat] + " \u00b7 " + p.addr;
    info.appendChild(nameEl);
    info.appendChild(metaEl);
    row.appendChild(info);

    var distEl = document.createElement("div");
    distEl.className = "poiDist";
    distEl.textContent = (p._dist!==undefined) ? formatDist(p._dist) : "";
    row.appendChild(distEl);

    row.addEventListener("click", function(){ selectPoi(p); });
    sheetEl.appendChild(row);
  });
}

function formatDist(m){
  if (m < 1000) return Math.round(m)+"m";
  return (m/1000).toFixed(1)+"km";
}

/* ============================================================
   DETAIL CARD
   ============================================================ */
var detailEl = document.getElementById("detail");

function selectPoi(p){
  state.selectedPoi = p;
  state.camX = p.x; state.camY = p.y;
  draw();

  document.getElementById("detailCat").textContent = CAT_LABEL[p.cat];
  document.getElementById("detailCat").style.background = CAT_COLOR[p.cat];
  document.getElementById("detailCat").style.color = "#231f1c";
  document.getElementById("detailName").textContent = p.name;
  document.getElementById("detailAddr").textContent = p.addr;
  document.getElementById("detailBlurb").textContent = p.blurb;
  document.getElementById("detailHours").textContent = p.hours;

  if (state.userLat!==null){
    var d = haversineMeters(state.userLat, state.userLon, p.lat, p.lon);
    var b = bearingDeg(state.userLat, state.userLon, p.lat, p.lon);
    document.getElementById("detailDist").textContent = formatDist(d);
    document.getElementById("detailBearing").textContent = Math.round(b)+"\u00b0";
  } else {
    document.getElementById("detailDist").textContent = "--";
    document.getElementById("detailBearing").textContent = "--";
  }

  detailEl.classList.add("open");
}

function hideDetail(){
  // no-op placeholder so future drag-to-dismiss can hook here
}

document.getElementById("detailClose").addEventListener("click", function(){
  detailEl.classList.remove("open");
  state.selectedPoi = null;
  draw();
});

   INIT
   ============================================================ */
resizeCanvas();
refreshList();
draw();

})();
